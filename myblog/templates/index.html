<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="icon"
      href="{% static 'images/favicon.png' %}"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="{% static 'css/index.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css"
      integrity="sha384-yourGeneratedHash"
      crossorigin="anonymous"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <style>
      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div id="mainNavigation">
      <nav role="navigation" id="navbar" class="bg-primary">
        <div class="container d-flex justify-content-center align-items-center">
          <a class="navbar-brand" href="/">
            <img
              src="{% static 'images/apple-touch-icon.png' %}"
              class="navbar-logo"
              height="100px"
              width="100px"
            />
            <span class="brand-name" id="heading">Bala's Blog</span>
          </a>
        </div>
      </nav>
      <div class="navbar-expand-md">
        <div class="navbar-dark text-center my-2">
          <button
            class="navbar-toggler w-75"
            id="navbar-toogler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavDropdown"
            aria-controls="navbarNavDropdown"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
            <span class="align-middle">Menu</span>
          </button>
        </div>
        <div
          class="text-center mt-3 collapse navbar-collapse"
          id="navbarNavDropdown"
        >
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Categories</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#contact">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div id="content">{% block content %} {% endblock %}</div>
    <div class="bg-secondary text-white" id="end-page">
      <div class="row">
        <div
          class="col-sm-12 col-lg-4 pt-sm-2 pt-lg-4 pl-sm-3 pl-lg-5 pb-lg-6"
          id="end-page-row"
        >
          <div class="pt-sm-12 pt-lg-4">
            <a name="contact"><h3>Contact Us</h3></a>
            <a
              href="mailto:balaxjd@gmail.com"
              class="bi bi-envelope-fill"
              style="color: black"
            >
              balaxjd@gmail.com</a
            ><br /><br>
            <a
              href="https://www.instagram.com/balaxjd_2006?igsh=MTRjcDZ0YjNkcGVpZg=="
              class="bi bi-instagram"
              style="color: black"
              >Instagram</a
              ><br /><br>
            <a
              href="https://www.facebook.com/profile.php?id=100088459282213"
              class="bi bi-facebook"
              style="color: black"
              >FaceBook</a
              ><br /><br>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
